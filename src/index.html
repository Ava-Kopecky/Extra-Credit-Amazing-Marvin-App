<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Marvin Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="logo">M</div>
        <nav class="sidebar-nav">
            <button class="nav-item active">Today</button>
            <button class="nav-item">Tasks</button>
            <button class="nav-item">Projects</button>
            <button class="nav-item">Calendar</button>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div>
                <p class="date">Monday, March 23</p>
                <h1>Today</h1>
            </div>
            <button class="add-task-btn">+ Add Task</button>
        </header>

        <section class="task-panel">
            <h2 class="section-title">All Tasks</h2>
            <div id="active-tasks"></div>

            <h2 class="section-title completed-title">Completed Tasks</h2>
            <div id="completed-tasks"></div>
        </section>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
